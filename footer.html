<!DOCTYPE html>
<html>

<head>
    <title>Footer Design</title>

    <style>
        footer {
            background: #111;
            color: white;
            padding: 30px 20px;
            font-family: Arial;
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            text-align: center;
        }

        .footer-box {
            width: 250px;
            margin: 10px;
        }

        .footer-box h2,
        .footer-box h3 {
            margin-bottom: 10px;
        }

        .footer-box p,
        .footer-box a {
            color: #ccc;
            text-decoration: none;
            display: block;
            margin: 5px 0;
        }

        .footer-box a:hover {
            color: white;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid #333;
            margin-top: 20px;
            padding-top: 10px;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <footer>
        <div class="footer-container">

            <!-- Box 1 -->
            <div class="footer-box">
                <h2>Prince Food Corner</h2>
                <p>Fresh & Delicious Dinner Everyday 🍽️</p>
            </div>

            <!-- Box 2 -->
            <div class="footer-box">
                <h3>Quick Links</h3>
                <a href="#">Home</a>
                <a href="#">Menu</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>

            <!-- Box 3 -->
            <div class="footer-box">
                <h3>Contact</h3>
                <p>📍 Lucknow, UP</p>
                <p>📞 +91 XXXXXXXX</p>
                <p>📧 princefood@gmail.com</p>
            </div>

            <!-- Box 4 -->
            <div class="footer-box">
                <h3>Follow Us</h3>
                <p>Instagram</p>
                <p>Facebook</p>
                <p>Twitter</p>
            </div>

        </div>

        <div class="footer-bottom">
            <p>© 2026 Prince Food Corner | All Rights Reserved</p>
        </div>
    </footer>

</body>

</html>
