<!DOCTYPE html>
<html>

<head>
    <title>Services</title>

    <style>
        /* Services Section */
        .services {
            padding: 80px 20px;
            background: #f5f5f5;
            text-align: center;
        }

        .service-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
        }

        /* Container */
        .service-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* Box */
        .service-box {
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        /* Hover */
        .service-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .service-box h2 {
            margin-bottom: 10px;
            color: #b40f0f;
        }

        .service-box p {
            font-size: 14px;
            color: #555;
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>

</head>

<body>

    <!-- Navbar link -->

    <!-- Services Section -->
    <section id="services" class="services">
        <h1 class="service-title">Our Services</h1>

        <div class="service-container">

            <div class="service-box">
                <h2>🍔 Fast Delivery</h2>
                <p>Get your food quickly at your doorstep.</p>
            </div>

            <div class="service-box">
                <h2>🍽️ Quality Food</h2>
                <p>Fresh and hygienic food every time.</p>
            </div>

            <div class="service-box">
                <h2>🧑‍🍳 Expert Chefs</h2>
                <p>Delicious food made by professional chefs.</p>
            </div>

            <div class="service-box">
                <h2>📞 24/7 Support</h2>
                <p>We are always ready to help you.</p>
            </div>

        </div>
    </section>

</body>

</html>
