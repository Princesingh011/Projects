<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>burger types</title>
    <style>
        body {
            background-color: #d9d9d9;
        }

        .logo {
            text-align: center;
        }

        .food {
            background-color: rgb(180, 15, 15);
            color: white;
            padding: 3px 15px;
            border-radius: 10px;
            display: inline;
            position: relative;
            top: 20px;
            font-size: 3rem;
        }

        .flex {
            display: flex;
            justify-content: center;
            position: relative;
            top: 20px;

        }

        a {
            text-decoration: none;
        }

        .box {
            height: 200px;
            width: 250px;
            background-color: black;
            margin: 50px;
            border: 10px solid rgb(23, 21, 21);
            position: relative;
            bottom: 20px;
        }

        .image {
            height: 100%;
            width: 100%;
        }

        .price-text {
            background-color: black;
            padding: 0px 5px;
            color: white;
        }

        .food-name {
            position: relative;
            left: 20px;
            color: white;
        }

        .add {
            color: white;
            position: relative;
            left: 30px;
            background-color: red;
            padding: 2px 5px;
            border-radius: 10px;
        }

        h1 {
            position: relative;
            bottom: 30px;
        }

        .box img {
            transition: 0.2s;
        }

        .box img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="logo">
        <h1 class="food">Burgers</h1>
    </div>

    <div class="flex">
        <div class="box">
            <a href="#"><img src="veg-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Veg Burger</span><br>Price - ₹40<a href="#"
                    class="add">Add</a></h1>
        </div>
        <div class="box">
            <a href="#"><img src="cheese-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Cheese Burger</span><br>Price - ₹50<a href="#"
                    class="add">Add</a></h1>
        </div>
        <div class="box">
            <a href="#"><img src="chiken-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Chiken Burger</span><br>Price - ₹60<a href="#"
                    class="add">Add</a></h1>
        </div>
    </div>

    <div class="flex">
        <div class="box">
            <a href="#"><img src="double-petty-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Petty Burger</span><br>Price - ₹60<a href="#"
                    class="add">Add</a></h1>
        </div>
        <div class="box">
            <a href="#"><img src="grill-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Grill Burger</span><br>Price - ₹50<a href="#"
                    class="add">Add</a></h1>
        </div>
        <div class="box">
            <a href="#"><img src="crispy-burger.jpg" class="image"></a>
            <h1 class="price-text"><span class="food-name">Crispy Burger</span><br>Price - ₹60<a href="#"
                    class="add">Add</a></h1>
        </div>
</body>

</html>
