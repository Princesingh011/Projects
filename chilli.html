<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chilli type</title>
    <style>
        .logo {
            text-align: center;
        }

        .food {
            background-color: rgb(180, 15, 15);
            color: white;
            padding: 3px 15px;
            border-radius: 10px;
            display: inline;
            position: relative;
            top: 100px;
            font-size: 2.5rem;
        }

        .flex {
            display: flex;
            position: relative;
            top: 20px;
        }

        .box {
            position: relative;
            top: 100px;
            height: 250px;
            width: 300px;
            background-color: black;
            margin: 50px;
            border: 10px solid rgb(23, 21, 21);
        }

        .image {
            height: 100%;
            width: 100%;
        }

        .price-text {
            background-color: black;
            padding: px 10px;
            color: white;

        }

        .food-name {

            color: white;
        }

        .add {
            color: white;
            position: relative;
            left: 30px;
            background-color: red;
            padding: 2px 10px;
            border-radius: 10px;
        }

        h1 {
            position: relative;
            bottom: 30px;
        }

        .price-tex {
            background-color: black;
            padding: px 10px;
            color: white;
            text-align: center;
        }

        .box img {
            transition: 0.2s;
        }

        .box img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <div class="logo">
        <h1 class="food">Chilli Potato</h1>
    </div>

    <div class="flex">
        <div class="box">
            <a href="#"><img src="drychillipotato.jpg" class="image"></a>
            <h1 class="price-tex"><span class="food-name">Dry-chilli <br>Potato</span><br>Price - ₹40<a href="#"
                    class="add">Add</a></h1>
        </div>
        <div class="box">
            <a href="#"><img src="gravychillipotato.jpg" class="image"></a>
            <h1 class="price-tex"><span class="food-name">Gravy-chilli Potato</span><br>Price - ₹40<a href="#"
                    class="add">Add</a>
            </h1>
        </div>
        <div class="box">
            <a href="#"><img src="honeychillipotato.jpg" class="image"></a>
            <h1 class="price-tex"><span class="food-name">Honey-chilli Potato</span><br>Price - ₹40<a href="#"
                    class="add">Add</a>
            </h1>
        </div>
        <div class="box">
            <a href="#"><img src="garlicchillipotato.jpg" class="image"></a>
            <h1 class="price-tex"><span class="food-name">Garlic-chilli Potato</span><br>Price - ₹40<a href="#"
                    class="add">Add</a>
            </h1>
        </div>
    </div>
</body>

</html>
